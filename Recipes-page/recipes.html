<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Recipes</title>
<link rel="stylesheet" href="style.css">
</head>

<body dir="rtl" lang="ar">

<header class="topbar">

  <div class="my-recipes">
    <span class="recipes-icon">🍴</span>
    <span class="recipes-text">وصفاتي</span>
  </div>

  <div class="topbar-right">
    <a href="#">الرئيسية</a>
    <a href="#">اكتشف</a>
    <a href="#">المفضلة</a>
    <a href="#">خطط الوجبات</a>
  </div>

  <div class="top-search">
    <input type="text" id="search" placeholder="ابحث عن وصفة أو مكون...">
    <span class="search-icon">🔍</span>
  </div>

   <div class="topbar-left">
    <button class="avatar-btn" aria-label="حساب المستخدم">👤</button>
    <button class="notif-btn" aria-label="الإشعارات">🔔</button>
  </div>
 
</header>

<div class="layout">

<div class="sidebar">

<h3>الفلاتر</h3>

<div class="sidebar-actions">
  <button id="clearFilters" class="clear-btn">مسح الكل</button>
</div>

<div class="filter-group">
  <div class="filter-heading">نوع النظام الغذائي</div>
  <label class="filter-item">
    <input type="radio" name="mealType" value="" checked>
    <span class="check"></span>
    <span class="filter-icon">📦</span>
    الكل
  </label>
  <label class="filter-item">
    <input type="radio" name="mealType" value="Breakfast">
    <span class="check"></span>
    <span class="filter-icon">🔥</span>
    وجبات سريعة
  </label>
  <label class="filter-item">
    <input type="radio" name="mealType" value="Lunch">
    <span class="check"></span>
    <span class="filter-icon">🥗</span>
    نباتي
  </label>
  <label class="filter-item">
    <input type="radio" name="mealType" value="Dinner">
    <span class="check"></span>
    <span class="filter-icon">💪</span>
    صحية
  </label>
</div>

<div class="filter-group">
  <div class="filter-heading">القيمة الغذائية</div>
  <label class="filter-item">
    <input type="radio" name="dietType" value="" checked>
    <span class="check"></span>
    <span class="filter-icon">📦</span>
    الكل
  </label>
  <label class="filter-item">
    <input type="radio" name="dietType" value="lowCarb">
    <span class="check"></span>
    <span class="filter-icon">⚡</span>
    قليل الكربوهيدرات
  </label>
  <label class="filter-item">
    <input type="radio" name="dietType" value="highProtein">
    <span class="check"></span>
    <span class="filter-icon">🔋</span>
    عالي البروتين
  </label>
</div>

<label class="filter-label">وقت التحضير (دقائق)</label>
<input type="range" id="timeFilter" min="5" max="120" value="60">
<div class="range-value"><span id="timeValue">60</span> دقيقة أو أقل</div>

</div>

<div class="content">
  <div id="resultsCount"></div>
  <div id="recipesContainer" class="recipes-container"></div>
</div>

</div>

<script src="recipes.js"></script>

</body>
</html>
