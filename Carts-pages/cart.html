<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cart</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- الهيدر بتاعك الأصلي -->
  <header class="topbar">

    <div class="my-recipes">
      <span class="recipes-icon">🍴</span>
      <span class="recipes-text">وصفاتي</span>
    </div>

    <div class="topbar-right">
      <a href="../Home-page/Index.html">الرئيسية</a>
      <a href="../Recipes-page/recipes.html">الوصفات</a>
      <a href="../favorite.html">المفضلة</a>
      <a href="../cart.html" class="cart-link">
  السله <i class="fa-solid fa-cart-arrow-down"></i>
  <span class="cart-badge" id="cart-count">0</span>
</a>
    </div>

    <div class="top-search">
      <input type="text" id="search" placeholder="ابحث عن وصفة أو مكون...">
      <span class="search-icon">🔍</span>
    </div>

    <div class="topbar-left">
      <button class="avatar-btn" aria-label="حساب المستخدم">👤</button>
      <button class="notif-btn" aria-label="الإشعارات">🔔</button>
    </div>

  </header>

  <!-- السلة — لاحظ كلاس cart-layout مش layout -->
  <div class="cart-layout">

    <div class="cart-section">
      <div class="page-head">
        <h2>سلة <span>التسوق</span></h2>
        <span class="badge" id="count-badge">0 أصناف</span>
      </div>
      <div id="cart"></div>
    </div>

    <div class="summary">
      <div class="summary-head">
        <h3>ملخص الطلب</h3>
      </div>
      <div class="summary-body">
        <div class="row"><span>المجموع</span>    <span id="sub">0 ج.م</span></div>
        <div class="row"><span>توصيل</span>      <span id="del">0 ج.م</span></div>
        <div class="row"><span>ضريبة 15%</span>  <span id="tax">0 ج.م</span></div>
        <div class="row total"><span>الإجمالي</span><span id="tot">0 ج.م</span></div>
      </div>
      <div class="summary-footer">
        <button class="btn-buy" id="buy-btn">🛍️ إتمام الشراء</button>
        <a href="../Recipes-page/recipes.html"><button class="btn-back">← مواصلة التسوق</button></a>
        
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
