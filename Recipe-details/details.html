<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./details.css">
</head>

<body>
    <!-- NavBar-start -->

    <header class="topbar">

        <div class="my-recipes">
            <span class="recipes-icon"> <i class="fa-solid fa-utensils"></i></span>
            <span class="recipes-text">وصفاتي</span>
        </div>

        <div class="topbar-right">
            <a href="../Home-page/Index.html" class="active">الرئيسية</a>
            <a href="../Recipes-page/recipes.html">الوصفات</a>
            <a href="">المفضلة</a>
            <a href="../Carts-pages/cart.html">السله</a>
        </div>

        <div class="top-search">
            <input type="text" id="search" placeholder="ابحث عن وصفة أو مكون...">
            <span class="search-icon">🔍</span>
        </div>

        <div class="topbar-left">
            <button class="avatar-btn" aria-label="حساب المستخدم">👤</button>
            <button class="notif-btn" aria-label="الإشعارات">🔔</button>
        </div>

    </header>

    <!-- NavBar-end -->

    <!-- Details-start -->
    <section class="details">
        <div class="container">
            <div class="row" id="detailsRow">

            </div>
            <div id="suggestionsSection" class="suggestions-section">
                
            </div>

        </div>
    </section>
    <!-- Details-end -->

    <dialog id="successDialog">
        <div class="dialog-content">
            <div class="dialog-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h3>تمت الإضافة بنجاح!</h3>
            <p>تم إضافة المكونات إلى سلة التسوق</p>
            <div class="dialog-btns">
                <button id="goToCart">عرض السلة</button>
                <button id="closeDialog">متابعة التسوق</button>
            </div>
        </div>
    </dialog>
    <script src="./details.js"></script>
</body>

</html>
